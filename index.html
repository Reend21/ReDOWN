<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re://DOWN</title>
    <link rel="stylesheet" href="./frontend/css/global.css">
    <link rel="stylesheet" href="./frontend/css/pages/home.css">
    <link rel="icon" type="image/png" href="./frontend/assets/logos/redown.png">
    <script src="./frontend/js/home.js"></script>
    <script src="./frontend/js/global.js"></script>
</head>
<body>

    <div class="page-wrapper" id="choosen-one">
        <div class="navbar">
                <a href="https://github.com/Reend21/ReDOWN">
                    <img width="40" height="40" src="./frontend/assets/icons/regular/github-logo.svg" alt="Github">
                </a>
                <a href="./frontend/pages/about.html">
                    <img width="40" height="40" src="./frontend/assets/icons/regular/info.svg" alt="About">
                </a>
                <a href="./frontend/pages/termsofethic.html">
                    <img width="40" height="40" src="./frontend/assets/icons/regular/book-open.svg" alt="Terms of ethic use"> 
                </a>
                <a href="./frontend/pages/donate.html">
                    <img width="40" height="40" src="./frontend/assets/icons/regular/heart.svg" alt="Donate">
                </a>
                <a href="">
                    <img width="40" height="40" src="./frontend/assets/icons/regular/heartbeat.svg" alt="Supported Platforms">
                </a>
                <a href="./frontend/pages/settings.html">
                    <img width="40" height="40" src="./frontend/assets/icons/regular/gear.svg" alt="Settings">
                </a>
        </div>

        <div class="main-area">
                <img width="128" height="128" src="frontend/assets/logos/redown.png" alt="Re://DOWN">
                    <h1>Re://DOWN</h1>
                    <h2>An FOSS, Ad-Free, Fast, Multiplatform Supported and Powerful Downloader.</h2>
                <div class="input-group">
                    <input type="text" name="link" id="down-link" placeholder="paste your link to start downlaoding videos!">
                    <button class="download"><img width="48" height="48" src="./frontend/assets/icons/regular/arrow-down.svg" alt="Down"></button>
                </div>
            <div class="download-alt">
                <div class="format-quality">
                    <div class="download-option">
                        <h4 class="down-text">Quality</h4>
                            <select class="down-btn" id="quality-select">
                                <option value="lowest">Lowest Quality Possible</option>
                                <option value="360p">360p</option>
                                <option value="480p">480p</option>
                                <option value="720p">720p</option>
                                <option value="1080p">1080p</option>
                                <option value="highest">Highest Quality Possible</option>                        
                            </select>
                    </div>

                    <div class="download-option">
                        <h4 class="down-text">Format</h4>
                            <select class="down-btn" id="format-select">
                                <option value="mp4">MP4</option>
                                <option value="mkv">MKV</option>
                                <option value="webm">WebM</option>
                                <option value="mp3">MP3</option>
                                <option value="opus">OPUS</option>
                                <option value="flac">FLAC</option>
                                <option value="ogg">OGG</option>
                            </select>
                    </div>

                </div>
                <div class="other">
                    <h4 class="">other things:</h4>
                </div>
            </div>
        </div>

        <div class="footer">
                <div class="footer-left">
                    <img src="frontend/assets/logos/redown.png" alt="Re://DOWN">
                </div>
                <div class="footer-right">
                    <ul class="footer-ul">
                        <li>
                            <a href="./frontend/pages/about.html">About</a>
                        </li>
                        <li>
                            <a href="https://github.com/Reend21/ReDOWN/blob/master/LICENSE">License</a>
                        </li>
                        <li>
                            <a href="./frontend/pages/termsofethic.html">Terms of ethic use</a>
                        </li>
                        <li>
                            <a href="https://github.com/Reend21/ReDOWN">Github</a>
                        </li>
                    </ul>
                    <ul class="footer-ul">
                        <li>
                            <a href="">API</a>
                        </li>
                        <li>
                            <a href="./frontend/pages/donate.html">Donate</a>
                        </li>
                        <li>
                            <a href="">Themes</a>
                        </li>
                        <li>
                            <a href="https://github.com/Reend21/ReDOWN/releases">Updates</a>
                        </li>
                    </ul>
                </div>
        </div>
    </div>
    
</body>
</html>

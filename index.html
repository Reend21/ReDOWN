    <script src="./frontend/js/home.js"></script>

</head>
<body>

    <div class="page-wrapper" id="choosen-one">
        <div class="navbar">
                <a href="https://github.com/Reend21/ReDOWN">
                    <img width="48" height="48" src="./frontend/assets/icons/regular/github-logo.svg" alt="Github">
                </a>
                <a href="./frontend/pages/about.html">
                    <img width="48" height="48" src="./frontend/assets/icons/regular/info.svg" alt="About">
                </a>
                <a href="">
                    <img width="48" height="48" src="./frontend/assets/icons/regular/book-open.svg" alt="Terms of ethic use"> 
                </a>
                <a href="./frontend/pages/donate.html">
                    <img width="48" height="48" src="./frontend/assets/icons/regular/heart.svg" alt="Donate">
                </a>
                <a href="">
                    <img width="48" height="48" src="./frontend/assets/icons/regular/heartbeat.svg" alt="Supported Platforms">
                </a>
                <a href="./frontend/pages/settings.html">
                    <img width="48" height="48" src="./frontend/assets/icons/regular/gear.svg" alt="Settings">
                </a>
        </div>

        <div class="main-area">
                <img width="128" height="128" src="frontend/assets/logos/redown.png" alt="Re://DOWN">
                    <h1>Re://DOWN</h1>
                    <h2>An FOSS, Ad-Free, Fast, Multiplatform Supported and Powerful Downloader.</h2>
                <div class="input-group">
                    <input type="text" name="link" id="down-link">
                    <button class="download"><img width="48" height="48" src="./frontend/assets/icons/regular/arrow-down.svg" alt="Down"></button>
                </div>
            <div class="download-alt">
                        <h4 class="quality">480p</h4>
                        <button class="quality-btn">
                            <a href="">
                                <img src="./assets/icons/down.svg" alt="Down">
                            </a>
                        </button>
                        <h4 class="format-video">MP4</h4>
                        <button class="format-down">
                            <a href="">
                                <img src="./assets/icons/down.svg" alt="down">
                            </a>
                        </button>
                        <h4 class="format-sound">MP3</h4>
                        <button class="format-down">
                            <a href="">
                                <img src="./assets/icons/down.svg" alt="down">
                            </a>
                        </button>
                    <img src="" alt="">
                </div>
        </div>

        <div class="footer">
                <img src="frontend/assets/logos/redown.png" alt="Re://DOWN">

                    <li>
                        <a href="ReDOWN/frontend/pages/about.html">About</a>
